name: Rollback - OCI VM

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to rollback to (e.g. sha-abc1234 or latest)"
        required: true

permissions:
  contents: read

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve rollback image
        id: image
        env:
          OCIR_REGISTRY: ${{ vars.OCIR_REGISTRY }}
          OCIR_NAMESPACE: ${{ vars.OCIR_NAMESPACE }}
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          INPUT_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          set -euo pipefail
          IMAGE_REPO="${OCIR_REGISTRY}/${OCIR_NAMESPACE}/${IMAGE_NAME}"
          if [[ "${INPUT_IMAGE_TAG}" == *:* ]]; then
            IMAGE_REF="${INPUT_IMAGE_TAG}"
          else
            IMAGE_REF="${IMAGE_REPO}:${INPUT_IMAGE_TAG}"
          fi
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "Rollback image: ${IMAGE_REF}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload rollback script
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_VM_HOST }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_VM_SSH_PRIVATE_KEY }}
          port: ${{ vars.SSH_PORT || 22 }}
          source: "deploy/remote-rollback.sh"
          target: "${{ vars.DEPLOY_PATH }}"
          overwrite: true

      - name: Remote rollback
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_VM_HOST }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_VM_SSH_PRIVATE_KEY }}
          port: ${{ vars.SSH_PORT || 22 }}
          script: |
            chmod +x "${{ vars.DEPLOY_PATH }}/deploy/remote-rollback.sh"
            echo "${{ secrets.OCIR_AUTH_TOKEN }}" | docker login "${{ vars.OCIR_REGISTRY }}" -u "${{ secrets.OCIR_USERNAME }}" --password-stdin
            DEPLOY_PATH="${{ vars.DEPLOY_PATH }}" IMAGE_REF="${{ steps.image.outputs.image_ref }}" bash "${{ vars.DEPLOY_PATH }}/deploy/remote-rollback.sh"
