name: CD - Build and Push Image to OCIR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_repo: ${{ steps.meta.outputs.image_repo }}
      image_sha: ${{ steps.meta.outputs.image_sha }}
      image_latest: ${{ steps.meta.outputs.image_latest }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        env:
          OCIR_REGISTRY: ${{ vars.OCIR_REGISTRY }}
          OCIR_NAMESPACE: ${{ vars.OCIR_NAMESPACE }}
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
        run: |
          set -euo pipefail
          if [[ -z "${OCIR_REGISTRY}" || -z "${OCIR_NAMESPACE}" || -z "${IMAGE_NAME}" ]]; then
            echo "Missing required repository variables: OCIR_REGISTRY, OCIR_NAMESPACE, IMAGE_NAME"
            exit 1
          fi
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_REPO="${OCIR_REGISTRY}/${OCIR_NAMESPACE}/${IMAGE_NAME}"
          IMAGE_SHA="${IMAGE_REPO}:sha-${SHORT_SHA}"
          IMAGE_LATEST="${IMAGE_REPO}:latest"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"
          echo "image_sha=${IMAGE_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${IMAGE_LATEST}" >> "$GITHUB_OUTPUT"

      - name: Login to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.OCIR_REGISTRY }}
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_AUTH_TOKEN }}

      - name: Build image
        run: |
          docker build -t "${{ steps.meta.outputs.image_sha }}" -t "${{ steps.meta.outputs.image_latest }}" .

      - name: Push image tags
        run: |
          docker push "${{ steps.meta.outputs.image_sha }}"
          docker push "${{ steps.meta.outputs.image_latest }}"

      - name: Summary
        env:
          IMAGE_SHA: ${{ steps.meta.outputs.image_sha }}
          IMAGE_LATEST: ${{ steps.meta.outputs.image_latest }}
        run: |
          echo "Pushed ${IMAGE_SHA}" >> "$GITHUB_STEP_SUMMARY"
          echo "Pushed ${IMAGE_LATEST}" >> "$GITHUB_STEP_SUMMARY"
