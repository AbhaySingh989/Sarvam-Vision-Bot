name: CD - Deploy to OCI VM

on:
  workflow_run:
    workflows: ["CD - Build and Push Image to OCIR"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag to deploy (e.g. latest or sha-abc1234)"
        required: true
        default: "latest"

permissions:
  contents: read

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image reference
        id: image
        env:
          OCIR_REGISTRY: ${{ vars.OCIR_REGISTRY }}
          OCIR_NAMESPACE: ${{ vars.OCIR_NAMESPACE }}
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          INPUT_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
          WORKFLOW_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          IMAGE_REPO="${OCIR_REGISTRY}/${OCIR_NAMESPACE}/${IMAGE_NAME}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${INPUT_IMAGE_TAG}"
          else
            TAG="sha-${WORKFLOW_HEAD_SHA::7}"
          fi

          if [[ "${TAG}" == *:* ]]; then
            IMAGE_REF="${TAG}"
          else
            IMAGE_REF="${IMAGE_REPO}:${TAG}"
          fi

          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "Resolved deploy image: ${IMAGE_REF}" >> "$GITHUB_STEP_SUMMARY"

      - name: Ensure remote deploy path exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_VM_HOST }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_VM_SSH_PRIVATE_KEY }}
          port: ${{ vars.SSH_PORT || 22 }}
          script: |
            mkdir -p "${{ vars.DEPLOY_PATH }}/deploy"

      - name: Upload compose and deploy scripts
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_VM_HOST }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_VM_SSH_PRIVATE_KEY }}
          port: ${{ vars.SSH_PORT || 22 }}
          source: "docker-compose.prod.yml,deploy/remote-deploy.sh"
          target: "${{ vars.DEPLOY_PATH }}"
          overwrite: true

      - name: Remote deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_VM_HOST }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_VM_SSH_PRIVATE_KEY }}
          port: ${{ vars.SSH_PORT || 22 }}
          script: |
            chmod +x "${{ vars.DEPLOY_PATH }}/deploy/remote-deploy.sh"
            echo "${{ secrets.OCIR_AUTH_TOKEN }}" | docker login "${{ vars.OCIR_REGISTRY }}" -u "${{ secrets.OCIR_USERNAME }}" --password-stdin
            DEPLOY_PATH="${{ vars.DEPLOY_PATH }}" IMAGE_REF="${{ steps.image.outputs.image_ref }}" bash "${{ vars.DEPLOY_PATH }}/deploy/remote-deploy.sh"
