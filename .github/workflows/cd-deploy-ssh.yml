name: CD - Deploy to OCI VM (SSH Deploy)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to deploy (branch/tag/commit). Defaults to main."
        required: false
        default: "main"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/sarvam-telegram-bot' }}
      SSH_PORT: ${{ vars.SSH_PORT || 22 }}
      IMAGE_REF: sarvam-telegram-bot:${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.git_ref || github.ref_name }}

      - name: Build deploy image
        run: |
          docker build -t "${{ env.IMAGE_REF }}" .

      - name: Export image tarball
        run: |
          docker save "${{ env.IMAGE_REF }}" | gzip > sarvam-telegram-bot-image.tar.gz

      - name: Prepare SSH key
        env:
          SSH_KEY_RAW: ${{ secrets.OCI_VM_SSH_PRIVATE_KEY }}
          SSH_KEY_B64: ${{ secrets.OCI_VM_SSH_PRIVATE_KEY_B64 }}
          OCI_VM_HOST: ${{ secrets.OCI_VM_HOST }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          if [[ -n "${SSH_KEY_B64}" ]]; then
            echo "${SSH_KEY_B64}" | base64 -d > "$HOME/.ssh/oci_vm_key"
          elif [[ -n "${SSH_KEY_RAW}" ]]; then
            printf '%s' "${SSH_KEY_RAW}" | sed 's/\\n/\n/g' > "$HOME/.ssh/oci_vm_key"
          else
            echo "Missing SSH key secret. Set OCI_VM_SSH_PRIVATE_KEY or OCI_VM_SSH_PRIVATE_KEY_B64."
            exit 1
          fi
          tr -d '\r' < "$HOME/.ssh/oci_vm_key" > "$HOME/.ssh/oci_vm_key.tmp" && mv "$HOME/.ssh/oci_vm_key.tmp" "$HOME/.ssh/oci_vm_key"
          chmod 600 "$HOME/.ssh/oci_vm_key"
          ssh-keyscan -p "${SSH_PORT}" "${OCI_VM_HOST}" >> "$HOME/.ssh/known_hosts"

      - name: Ensure remote deploy path exists
        env:
          OCI_VM_HOST: ${{ secrets.OCI_VM_HOST }}
          OCI_VM_USER: ${{ secrets.OCI_VM_USER }}
        run: |
          ssh -i "$HOME/.ssh/oci_vm_key" -p "${SSH_PORT}" "${OCI_VM_USER}@${OCI_VM_HOST}" "mkdir -p '${DEPLOY_PATH}/deploy'"

      - name: Upload app files to VM
        env:
          OCI_VM_HOST: ${{ secrets.OCI_VM_HOST }}
          OCI_VM_USER: ${{ secrets.OCI_VM_USER }}
        run: |
          scp -i "$HOME/.ssh/oci_vm_key" -P "${SSH_PORT}" docker-compose.prod.yml "${OCI_VM_USER}@${OCI_VM_HOST}:${DEPLOY_PATH}/docker-compose.prod.yml"
          scp -i "$HOME/.ssh/oci_vm_key" -P "${SSH_PORT}" deploy/remote-deploy.sh "${OCI_VM_USER}@${OCI_VM_HOST}:${DEPLOY_PATH}/deploy/remote-deploy.sh"
          scp -i "$HOME/.ssh/oci_vm_key" -P "${SSH_PORT}" sarvam-telegram-bot-image.tar.gz "${OCI_VM_USER}@${OCI_VM_HOST}:${DEPLOY_PATH}/sarvam-telegram-bot-image.tar.gz"

      - name: Load image and deploy on VM
        env:
          OCI_VM_HOST: ${{ secrets.OCI_VM_HOST }}
          OCI_VM_USER: ${{ secrets.OCI_VM_USER }}
        run: |
          ssh -i "$HOME/.ssh/oci_vm_key" -p "${SSH_PORT}" "${OCI_VM_USER}@${OCI_VM_HOST}" "chmod +x '${DEPLOY_PATH}/deploy/remote-deploy.sh' && gzip -dc '${DEPLOY_PATH}/sarvam-telegram-bot-image.tar.gz' | docker load && DEPLOY_PATH='${DEPLOY_PATH}' IMAGE_REF='${IMAGE_REF}' SKIP_PULL='true' bash '${DEPLOY_PATH}/deploy/remote-deploy.sh'"
